appId: ${APP_ID}
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: "screen-hub"
    timeout: 15000

- tapOn:
    id: "hub-quick-play-button"
- extendedWaitUntil:
    visible:
      id: "screen-quick-play"
    timeout: 10000
- assertVisible: "Classic"
- assertVisible: "Speed"
- assertVisible: "60 Seconds"

- tapOn: "Classic"
- extendedWaitUntil:
    visible:
      id: "screen-game"
    timeout: 15000
